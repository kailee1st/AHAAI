services:
  - type: web
    name: aha-moment-api
    runtime: python
    rootDir: backend
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # Render 대시보드에서 직접 입력
      - key: CORS_ORIGINS
        sync: false   # 필요 시 추가 도메인 입력
